<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>style 属性で見た目を変える</title>
</head>
<body>
  
<div style="position: relative; width: 480px; height: 374px;">
  <img src="./bg0.png" style="position: absolute; left: 0px; top: 0px;">
  <img src="./butterfly.gif" style="position: absolute; left: 400px; top: 500px; width: 80px;">
  <img src="./butterfly.gif" style="position: absolute; left: 160px; top: 560px; width: 80px;">
  <img src="./butterfly.gif" style="position: absolute; left: 500px; top: 600px; width: 80px;">
  <div style="background-color: #2563eb;">ぽかぽか陽気の穏やかな朝<br>花畑では、蝶々がのんびり飛んでいます
  </div>
</div>

</body>
</html>
